{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <div><h1>Release Payment</h1><p class="subtitle">Final step of the S2P cycle</p></div>
    <a href="/invoices" class="btn btn-secondary">← Back</a>
</div>
<div class="form-card">
    <div class="info-box info-success">
        ✅ <strong>3-Way Match Passed</strong> — Invoice <strong>{{ invoice.invoice_number }}</strong>
        from <strong>{{ invoice.vendor_name }}</strong> approved for
        <strong>₹{{ "%.2f"|format(invoice.invoice_amount) }}</strong>
    </div>
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Amount to Pay (₹) *</label>
                <input type="number" step="0.01" name="amount_paid" value="{{ invoice.invoice_amount }}" required>
            </div>
            <div class="form-group">
                <label>Payment Mode *</label>
                <select name="payment_mode" required>
                    <option>Bank Transfer</option>
                    <option>NEFT</option>
                    <option>RTGS</option>
                    <option>Cheque</option>
                    <option>UPI</option>
                </select>
            </div>
            <div class="form-group">
                <label>Reference / Transaction Number</label>
                <input type="text" name="reference_no" placeholder="TXN123456789">
            </div>
        </div>
        <button type="submit" class="btn btn-success">💳 Confirm Payment</button>
    </form>
</div>
{% endblock %}
