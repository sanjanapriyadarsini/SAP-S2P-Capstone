{% extends "base.html" %}
{% block content %}

<div class="page-header">
    <div>
        <h1>Create Purchase Order</h1>
        <p class="subtitle">Send an official order to a vendor</p>
    </div>
    <a href="/purchase-orders" class="btn btn-secondary">← Back</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group form-full">
                <label>Link to Approved Requisition (optional)</label>
                <select name="requisition_id">
                    <option value="">— Select PR (optional) —</option>
                    {% for r in requisitions %}
                    <option value="{{ r.id }}">PR-{{ r.id }}: {{ r.item_name }} ({{ r.department }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Select Vendor *</label>
                <select name="vendor_id" required>
                    <option value="">— Choose Vendor —</option>
                    {% for v in vendors %}
                    <option value="{{ v.id }}">{{ v.name }} ({{ v.category }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Item Name *</label>
                <input type="text" name="item_name" required placeholder="Item description">
            </div>
            <div class="form-group">
                <label>Quantity *</label>
                <input type="number" name="quantity" id="qty" min="1" required oninput="calcTotal()">
            </div>
            <div class="form-group">
                <label>Unit Price (₹) *</label>
                <input type="number" step="0.01" name="unit_price" id="unit_price" required oninput="calcTotal()">
            </div>
            <div class="form-group">
                <label>Total Amount (auto-calculated)</label>
                <input type="text" id="total_display" readonly placeholder="Fill qty & price above">
            </div>
            <div class="form-group">
                <label>Expected Delivery Date</label>
                <input type="date" name="delivery_date">
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Create & Send PO</button>
    </form>
</div>

<script>
function calcTotal() {
    const q = parseFloat(document.getElementById('qty').value) || 0;
    const p = parseFloat(document.getElementById('unit_price').value) || 0;
    document.getElementById('total_display').value = '₹' + (q * p).toFixed(2);
}
</script>

{% endblock %}
